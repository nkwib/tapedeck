name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: CLI smoke test
        run: |
          node dist/cli.js --version
          node dist/cli.js --help > /dev/null
          node dist/cli.js ls ./does-not-exist | grep -q "No cassettes"
      - name: Cross-bundle smoke test (dist entry points)
        run: pnpm smoke

  docs-site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: docs-site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
