name: SDK compatibility

on:
  schedule:
    # Mondays 09:30 UTC (offset from toolroute's 09:00 so failures are distinguishable)
    - cron: '30 9 * * 1'
  workflow_dispatch:

jobs:
  test-against-latest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - id: bump
        name: Install ai@latest and capture version
        run: |
          pnpm add -D ai@latest --silent
          v=$(node -p "require('./node_modules/ai/package.json').version")
          echo "sdk_version=$v" >> "$GITHUB_OUTPUT"
          echo "Tested against ai@$v"
      - id: run
        name: Run suite
        continue-on-error: true
        run: |
          pnpm typecheck
          pnpm test
      - name: Open issue on failure
        if: steps.run.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const sdk = '${{ steps.bump.outputs.sdk_version }}';
            const title = `sdk-drift: ai@${sdk} broke the suite`;
            const body = [
              `Weekly compatibility run failed against \`ai@${sdk}\`.`,
              ``,
              `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Suspected cause: language-model spec v3 shape change (stream parts, generate result, or tool schema).`,
              ``,
              `When the cause is identified, update \`COMPATIBILITY.md\` with a `,
              `\`❌ fail\` row pointing at this issue and either pin the peer `,
              `range or ship a fix. Recorded cassettes embed the format version, `,
              `so a breaking shape change should also bump \`CASSETTE_VERSION\`.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['sdk-drift'],
            });
      - name: Insert pass row into the COMPATIBILITY.md table
        if: steps.run.outcome == 'success'
        run: |
          set -euxo pipefail
          sdk='${{ steps.bump.outputs.sdk_version }}'
          today=$(date -u +%Y-%m-%d)
          pkg=$(node -p "require('./package.json').version")
          row="| $sdk | $today | $pkg | ✅ pass | Weekly cron. |"
          # Idempotent reruns: skip if this SDK version already has a row.
          if grep -qF "| $sdk |" COMPATIBILITY.md; then
            exit 0
          fi
          # Insert at the end of the "Tested versions" table (not end of file —
          # prose sections follow the table).
          awk -v row="$row" '
            /^\| SDK \(/ { intable=1 }
            intable && !added && !/^\|/ { print row; added=1 }
            { print }
            END { if (intable && !added) print row }
          ' COMPATIBILITY.md > COMPATIBILITY.md.tmp
          mv COMPATIBILITY.md.tmp COMPATIBILITY.md
      - name: Open PR with COMPATIBILITY.md update
        if: steps.run.outcome == 'success'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: sdk-compat/auto-update
          title: "chore(compat): record successful run against ai@${{ steps.bump.outputs.sdk_version }}"
          commit-message: "chore(compat): record successful run against ai@${{ steps.bump.outputs.sdk_version }}"
          body: "Weekly compatibility cron — passing run against ai@${{ steps.bump.outputs.sdk_version }}."
          add-paths: |
            COMPATIBILITY.md
